<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Creative Computing Timeline</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&display=swap');

  :root {
    --bg: #fafaf8;
    --text: #111;
    --muted: #999;
    --rule: #ddd;

    --alg: #111;
    --game: #c0392b;
    --vr: #2563a8;
    --web: #1a7a4a;
    --install: #b45309;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html { font-size: 16px; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
  }

  header {
    max-width: 760px;
    margin: 0 auto;
    padding: 80px 40px 56px;
    border-bottom: 1px solid var(--rule);
  }

  header .kicker {
    font-size: 10px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 20px;
  }

  header h1 {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(32px, 5vw, 52px);
    font-weight: 400;
    line-height: 1.1;
    letter-spacing: -0.01em;
    color: var(--text);
    margin-bottom: 20px;
  }

  header h1 em {
    font-style: italic;
    color: var(--muted);
  }

  header p {
    font-size: 13px;
    color: var(--muted);
    line-height: 1.8;
    max-width: 480px;
  }

  .legend {
    max-width: 760px;
    margin: 0 auto;
    padding: 20px 40px;
    display: flex;
    flex-wrap: wrap;
    gap: 8px 28px;
    border-bottom: 1px solid var(--rule);
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 7px;
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    cursor: pointer;
    user-select: none;
    transition: color 0.15s;
  }

  .legend-item.active { color: var(--text); }
  .legend-item:hover { color: var(--text); }

  .legend-swatch {
    width: 16px;
    height: 2px;
    background: var(--swatch-color);
    transition: opacity 0.15s;
  }

  .legend-item:not(.active) .legend-swatch { opacity: 0.2; }

  .timeline {
    max-width: 760px;
    margin: 0 auto;
    padding: 0 40px 100px;
  }

  .decade-sep {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 40px 0 16px;
  }

  .decade-sep span {
    font-size: 10px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--muted);
    white-space: nowrap;
  }

  .decade-sep hr {
    flex: 1;
    border: none;
    border-top: 1px solid var(--rule);
  }

  .event {
    display: grid;
    grid-template-columns: 52px 1fr;
    gap: 0 20px;
    padding: 14px 0;
    border-bottom: 1px solid var(--rule);
    cursor: pointer;
    opacity: 0;
    transform: translateY(6px);
    transition: opacity 0.4s ease, transform 0.4s ease, background 0.15s;
  }

  .event.visible { opacity: 1; transform: translateY(0); }

  .event.hidden-branch {
    opacity: 0 !important;
    pointer-events: none;
    border-color: transparent;
    height: 0;
    padding: 0;
    overflow: hidden;
  }

  .event:hover { background: #f4f4f2; }

  .event-year {
    font-size: 11px;
    color: var(--muted);
    padding-top: 3px;
    letter-spacing: 0.05em;
  }

  .event-head {
    display: flex;
    align-items: baseline;
    gap: 10px;
    flex-wrap: wrap;
  }

  .event-title {
    font-family: 'DM Serif Display', serif;
    font-size: 18px;
    font-weight: 400;
    color: var(--text);
    line-height: 1.2;
  }

  .event-creator {
    font-size: 11px;
    color: var(--muted);
  }

  .branch-mark {
    display: inline-block;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--branch-color);
    flex-shrink: 0;
    position: relative;
    top: -1px;
  }

  .event-subtitle {
    font-size: 11px;
    color: var(--muted);
    margin-top: 3px;
    font-style: italic;
  }

  .expand-icon {
    font-size: 12px;
    color: var(--muted);
    transition: transform 0.2s;
    line-height: 1;
  }

  .event.expanded .expand-icon { transform: rotate(45deg); }

  .event-details {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.35s ease, opacity 0.3s ease;
    opacity: 0;
  }

  .event-details.open { max-height: 360px; opacity: 1; }

  .event-details-inner {
    padding: 14px 0 6px;
    display: grid;
    grid-template-columns: 130px 1fr 1fr;
    gap: 12px 24px;
    align-items: start;
  }

  .event-img {
    width: 130px;
    height: 90px;
    object-fit: cover;
    display: block;
    filter: grayscale(15%);
    background: #e8e8e6;
  }

  .event-img-placeholder {
    width: 130px;
    height: 90px;
    background: #e8e8e6;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 9px;
    color: var(--muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  @media (max-width: 560px) {
    .event-details-inner { grid-template-columns: 1fr; }
    .event-img, .event-img-placeholder { width: 100%; height: 140px; }
    header, .legend, .timeline { padding-left: 20px; padding-right: 20px; }
  }

  .detail-label {
    font-size: 9px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 5px;
  }

  .detail-text {
    font-size: 12px;
    line-height: 1.7;
    color: #555;
  }
</style>
</head>
<body>

<header>
  <div class="kicker">Research Timeline · Creative Computing</div>
  <h1>From Static Logic<br>to <em>Participatory Worlds</em></h1>
  <p>Creative computing traced from early algorithmic plotter graphics to immersive, user-authored virtual realities. Click any entry to expand.</p>
  <p style="margin-top:12px; font-size:11px; color:#999; letter-spacing:0.15em; text-transform:uppercase;">Ryan Kang</p>
</header>

<div class="legend" id="legend">
  <div class="legend-item active" data-branch="alg" style="--swatch-color:var(--alg)"><div class="legend-swatch"></div>Algorithmic</div>

  <div class="legend-item active" data-branch="vr" style="--swatch-color:var(--vr)"><div class="legend-swatch"></div>Virtual Reality</div>
  <div class="legend-item active" data-branch="web" style="--swatch-color:var(--web)"><div class="legend-swatch"></div>Net Art</div>
  <div class="legend-item active" data-branch="install" style="--swatch-color:var(--install)"><div class="legend-swatch"></div>Installation</div>
</div>

<div class="timeline" id="timeline"></div>

    description:'A social VR platform where embodied avatars inhabit user-built worlds. Full-body tracking enables expressiveness beyond screen-based interaction.',
    interaction:'Embodied participation; infrastructure-dependent social creativity.' },
];

const container = document.getElementById('timeline');
const activeBranches = new Set(['alg','game','vr','web','install']);

function build() {
  container.innerHTML = '';
  let lastDecade = null;

  events.forEach(ev => {
    const decade = Math.floor(ev.year / 10) * 10;
    if (decade !== lastDecade) {
      lastDecade = decade;
      const sep = document.createElement('div');
      sep.className = 'decade-sep';
      sep.innerHTML = `<span>${decade}s</span><hr>`;
      container.appendChild(sep);
    }

    const row = document.createElement('div');
    row.className = 'event';
    row.dataset.branch = ev.branch;
    row.style.setProperty('--branch-color', COLORS[ev.branch]);

    const imgTag = ev.img
      ? `<img class="event-img" src="${ev.img}" alt="${ev.title}">`
      : `<div class="event-img-wrap">${ev.svg}</div>`;

    row.innerHTML = `
      <div class="event-year">${ev.year}</div>
      <div class="event-main">
        <div class="event-head">
          <span class="event-title">${ev.title}</span>
          <span class="branch-mark"></span>
          <span class="event-creator">${ev.creator}</span>
          <span class="expand-icon">+</span>
        </div>
        <div class="event-subtitle">${ev.subtitle}</div>
        <div class="event-details">
          <div class="event-details-inner">
            ${imgTag}
            <div>
              <div class="detail-label">Description</div>
              <div class="detail-text">${ev.description}</div>
            </div>
            <div>
              <div class="detail-label">Interaction</div>
              <div class="detail-text">${ev.interaction}</div>
            </div>
          </div>
        </div>
      </div>
    `;

    if (!activeBranches.has(ev.branch)) row.classList.add('hidden-branch');

    row.addEventListener('click', () => {
      const details = row.querySelector('.event-details');
      const isOpen = details.classList.contains('open');
      document.querySelectorAll('.event-details.open').forEach(d => {
        d.classList.remove('open');
        d.closest('.event')?.classList.remove('expanded');
      });
      if (!isOpen) { details.classList.add('open'); row.classList.add('expanded'); }
    });

    container.appendChild(row);
  });

  const io = new IntersectionObserver(entries => {
    entries.forEach(e => {
      if (e.isIntersecting) { e.target.classList.add('visible'); io.unobserve(e.target); }
    });
  }, { threshold: 0.05 });

  document.querySelectorAll('.event').forEach(el => io.observe(el));
}

document.querySelectorAll('.legend-item').forEach(item => {
  item.addEventListener('click', () => {
    const branch = item.dataset.branch;
    if (activeBranches.has(branch)) {
      if (activeBranches.size === 1) return;
      activeBranches.delete(branch);
      item.classList.remove('active');
    } else {
      activeBranches.add(branch);
      item.classList.add('active');
    }
    document.querySelectorAll('.event').forEach(ev => {
      const show = activeBranches.has(ev.dataset.branch);
      ev.classList.toggle('hidden-branch', !show);
      if (!show) ev.querySelector('.event-details')?.classList.remove('open');
    });
  });
});

build();
</script>
